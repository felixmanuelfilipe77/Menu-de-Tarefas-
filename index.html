<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Meu Portfólio Escolar</title>
    <style>
        /* ===== Reset básico ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 5px;
            color: #555;
            font-size: 18px;
        }

        .buttons {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .buttons a {
            flex: 1;
            text-decoration: none;
            padding: 12px 0;
            background-color: #4CAF50;
            color: white;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: bold;
        }

        .buttons a:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Félix Manuel Filipe</h1>
        <p>Número: 15</p>
        <p>Sala: 18</p>
        <p>Turma: BNI</p>

        <div class="buttons">
            <a href="1trimestre.html">Iº Trimestre</a>
            <a href="2trimestre.html">IIº Trimestre</a>
            <a href="3trimestre.html">IIIº Trimestre</a>
        </div>
    </div>

</body>
</html>
